<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Poppins', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    padding:20px;
    overflow:hidden;
    position:relative;
    background: radial-gradient(circle at 20% 20%, #0f2a56, #050b1f 60%, #000814 100%);
}

/* ================= GIF BACKGROUND ================= */
.gif-bg{
    position:fixed;
    inset:0;
    background-image:url("https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExZncyY2o3ZXIyY3Q3Mm4xMGs0dGZ6dXN4MDhzdDA4ano5eWQyZm1hbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/C8gkEYivtQDlGzyAwp/giphy.gif");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:-5;
}

.gif-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:-4;
}
/* ================================================== */

/* ================= GALAXY BACKGROUND ================= */

.galaxy{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-3;
}

.nebula{
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(0,180,255,0.35), transparent 70%);
    filter: blur(120px);
    animation: floatNebula 30s ease-in-out infinite alternate;
}

.nebula.two{
    right:-200px;
    bottom:-200px;
    background: radial-gradient(circle, rgba(0,255,200,0.25), transparent 70%);
}

@keyframes floatNebula{
    from{ transform: translateY(-40px) translateX(-40px); }
    to{ transform: translateY(40px) translateX(40px); }
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{ opacity:0.2; }
    50%{ opacity:1; }
}

.shooting-star{
    position:absolute;
    width:140px;
    height:2px;
    background: linear-gradient(90deg, white, transparent);
    filter: drop-shadow(0 0 6px white);
    animation: shoot 8s linear infinite;
}

@keyframes shoot{
    0%{ transform: translateX(0) translateY(0); opacity:1; }
    100%{ transform: translateX(-1000px) translateY(600px); opacity:0; }
}

/* ================= CONTENT ================= */

.container{
    text-align:center;
    max-width:900px;
    width:100%;
}

.small-text{
    letter-spacing:4px;
    color:#c9a227;
    font-size:14px;
    margin-bottom:20px;
}

h1{
    font-family:'Playfair Display', serif;
    font-weight:400;
    font-size:48px;
    margin-bottom:30px;
    line-height:1.3;
    text-shadow:0 0 25px rgba(255,255,255,0.3);
}

.image-box{
    border:2px solid #c9a227;
    padding:10px;
    margin:30px auto;
    max-width:500px;
    width:90%;
    border-radius:12px;
}

.image-box img{
    width:100%;
    max-height:400px;
    object-fit:cover;
    border-radius:8px;
}

/* Buttons */

.button-group{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

button{
    padding:15px 40px;
    font-size:16px;
    border:none;
    cursor:pointer;
    transition:0.3s ease;
    letter-spacing:2px;
}

.accept{
    background:linear-gradient(45deg,#c9a227,#e8d28a);
    color:#000;
    border-radius:6px;
}

.accept:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #c9a227;
}

.decline{
    background:transparent;
    border:2px solid #c9a227;
    color:#fff;
    border-radius:6px;
}

.decline:hover{
    background:#c9a227;
    color:#000;
}

/* ================= POPUP ================= */

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:0.4s ease;
    padding:20px;
    z-index:999;
}

.popup.active{
    opacity:1;
    visibility:visible;
}

.popup-content{
    background:linear-gradient(145deg,#0f2a56,#081126);
    border:2px solid #c9a227;
    border-radius:16px;
    padding:clamp(20px,5vw,40px);
    width:100%;
    max-width:clamp(280px,90%,500px);
    text-align:center;
    box-shadow:0 0 30px rgba(201,162,39,0.4);
    animation:popupScale 0.4s ease;
}

@keyframes popupScale{
    from{ transform:scale(0.8); opacity:0; }
    to{ transform:scale(1); opacity:1; }
}

.popup-content h2{
    font-family:'Playfair Display', serif;
    font-size:clamp(18px,4vw,28px);
    line-height:1.5;
}

/* MOBILE */
@media(max-width:768px){
    h1{ font-size:26px; }
    .small-text{ font-size:12px; letter-spacing:2px; }
    .image-box img{ max-height:250px; }
    .button-group{ flex-direction:column; gap:15px; }
    button{ width:100%; padding:14px; font-size:15px; }
    .nebula{ width:400px; height:400px; }
}
</style>
</head>

<body>

<!-- GIF Background -->
<div class="gif-bg"></div>
<div class="gif-overlay"></div>

<div class="galaxy" id="galaxy">
    <div class="nebula"></div>
    <div class="nebula two"></div>
</div>

<div class="container">
    <div class="small-text">AN INVITATION</div>

    <h1>
        Will you do me the<br>
        absolute honor<br>
        of being my Forever?
    </h1>

    <div class="image-box">
        <img src="fotoutama.jpeg" alt="Couple Photo">
    </div>

    <div class="button-group">
        <button class="accept" onclick="acceptLove()">I ACCEPT</button>
        <button class="decline" onclick="declineLove()">DECLINE</button>
    </div>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="popupText"></h2>
    </div>
</div>

<script>
let starCount = window.innerWidth < 768 ? 60 : 140;

for(let i=0;i<starCount;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    star.style.animationDelay=Math.random()*3+"s";
    document.getElementById("galaxy").appendChild(star);
}

for(let i=0;i<3;i++){
    let shoot=document.createElement("div");
    shoot.className="shooting-star";
    shoot.style.top=Math.random()*50+"vh";
    shoot.style.left=Math.random()*100+"vw";
    shoot.style.animationDelay=Math.random()*10+"s";
    document.getElementById("galaxy").appendChild(shoot);
}

function acceptLove(){
    window.location.href="index2.html";
}

function declineLove(){
    document.getElementById("popupText").innerText=
    "Anda harus melihat kenangan Tasya dan Kevin 💛";

    document.getElementById("popup").classList.add("active");

    setTimeout(function(){
        window.location.href="index2.html";
    },3000);
}
</script>

</body>
</html>
